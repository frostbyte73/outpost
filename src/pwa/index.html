<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Claude Relay</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070707">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <!-- Apply persisted theme before the first paint so there's no FOUC on theme switch.
       Reads localStorage; default is LiveKit dark. -->
  <script>
    (function () {
      var validThemes = ['livekit', 'almanac', 'terminal', 'nordic', 'ink', 'botanical', 'plasma', 'atlas', 'library'];
      var validModes = ['light', 'dark'];
      var theme = localStorage.getItem('cr:theme');
      var mode = localStorage.getItem('cr:mode');
      if (validThemes.indexOf(theme) === -1) theme = 'livekit';
      if (validModes.indexOf(mode) === -1) mode = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-mode', mode);
    })();
  </script>

  <style>
    /* ───── Theme tokens ────────────────────────────────────────────
       Each theme provides a full set of token values for its dark and light
       variants. The pre-render script in <head> applies data-theme + data-mode
       on <html>; defaults to livekit/dark.

       Token families:
         --bg, --bg-elev, --bg-elev-2     surfaces (deepest → most elevated)
         --line, --line-soft              dividers
         --text, --text-mute, --text-dim  text levels (brightest → dimmest)
         --accent, --accent-soft          brand / selection / pending
         --danger, --danger-soft          destructive / errors
         --font-display                   italic / display flourishes
         --font-body                      everything else
         --font-mono                      explicit code & terminal-caret
    */

    /* LiveKit — vivid cyan-on-graphite, sans throughout. Default. */
    [data-theme="livekit"][data-mode="dark"] {
      --bg: #070707;
      --bg-elev: #131313;
      --bg-elev-2: #1f1f1f;
      --line: #2a2a2a;
      --line-soft: #1a1a1a;
      --text: #ffffff;
      --text-mute: #999999;
      --text-dim: #555555;
      --accent: #1fd5f9;
      --accent-soft: rgba(31, 213, 249, 0.14);
      /* Greyed-down lavender. The original #b8a8f0 lived at ~0.46 luminance vs cyan's
         ~0.66 — only a 1.4× gap, so the two accents felt like co-stars. Pulling
         saturation out and dropping luminance to ~0.30 (2.2× gap) restores hierarchy
         without losing the lavender hue identity. */
      --accent-2: #8a8ab8;
      --accent-2-soft: rgba(138, 138, 184, 0.14);
      --danger: #fa4c39;
      --danger-soft: rgba(250, 76, 57, 0.14);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="livekit"][data-mode="light"] {
      --bg: #fdfdfc;
      --bg-elev: #ffffff;
      --bg-elev-2: #efefec;
      --line: #dbdbd8;
      --line-soft: #ececea;
      --text: #000000;
      --text-mute: #636363;
      --text-dim: #b5b5b0;
      --accent: #0a259f;
      --accent-soft: rgba(10, 37, 159, 0.10);
      --accent-2: #5a5680;
      --accent-2-soft: rgba(90, 86, 128, 0.10);
      --danger: #b32909;
      --danger-soft: rgba(179, 41, 9, 0.10);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Almanac — editorial italic serif + tracked mono, amber signal.
       Feels like a Penguin paperback in light mode, like a private library
       reading lamp in dark mode. */
    [data-theme="almanac"][data-mode="dark"] {
      --bg: #0a0a0a;
      --bg-elev: #131313;
      --bg-elev-2: #1a1a1a;
      --line: #262626;
      --line-soft: #1d1d1d;
      --text: #e9e6dd;
      --text-mute: #807a6d;
      --text-dim: #4a463e;
      --accent: #f4b91a;
      --accent-soft: rgba(244, 185, 26, 0.12);
      --accent-2: #4d9494;
      --accent-2-soft: rgba(77, 148, 148, 0.12);
      --danger: #e83a3a;
      --danger-soft: rgba(232, 58, 58, 0.12);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="almanac"][data-mode="light"] {
      --bg: #faf7ef;
      --bg-elev: #ffffff;
      --bg-elev-2: #f2ede0;
      --line: #d4cfc0;
      --line-soft: #e8e3d3;
      --text: #1c1814;
      --text-mute: #6b6553;
      --text-dim: #b3ac96;
      --accent: #9a6300;
      --accent-soft: rgba(154, 99, 0, 0.10);
      --accent-2: #2f6b6b;
      --accent-2-soft: rgba(47, 107, 107, 0.10);
      --danger: #a31f1f;
      --danger-soft: rgba(163, 31, 31, 0.10);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Terminal — brutalist achromatic body (black/white/grey, mono everywhere)
       lit by a single CRT-phosphor green accent. Same structural posture as
       LiveKit and Almanac, just with #00ff41 in place of cyan/amber. */
    [data-theme="terminal"][data-mode="dark"] {
      --bg: #000000;
      --bg-elev: #0a0a0a;
      --bg-elev-2: #161616;
      --line: #2a2a2a;
      --line-soft: #181818;
      --text: #f0f0f0;
      --text-mute: #808080;
      --text-dim: #3a3a3a;
      --accent: #00ff41;
      --accent-soft: rgba(0, 255, 65, 0.14);
      /* Slate grey-blue. Pink phosphor read as candy next to neon green — both at
         high luminance + saturation, ~1.7× gap, no clear hierarchy. Slate sits at
         ~0.24 luminance vs green's ~0.79 (3.3× gap) and is fully desaturated, so
         the green stays the unambiguous live signal. Maps to "monochrome monitor
         chrome" — a thematically-coherent achromatic support color. */
      --accent-2: #708090;
      --accent-2-soft: rgba(112, 128, 144, 0.14);
      --danger: #ff3050;
      --danger-soft: rgba(255, 48, 80, 0.12);
      --font-display: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-body: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="terminal"][data-mode="light"] {
      --bg: #ffffff;
      --bg-elev: #fafafa;
      --bg-elev-2: #f0f0f0;
      --line: #d4d4d4;
      --line-soft: #e8e8e8;
      --text: #000000;
      --text-mute: #707070;
      --text-dim: #c0c0c0;
      --accent: #009633;
      --accent-soft: rgba(0, 150, 51, 0.10);
      --accent-2: #5a6878;
      --accent-2-soft: rgba(90, 104, 120, 0.10);
      --danger: #a01f1f;
      --danger-soft: rgba(160, 31, 31, 0.10);
      --font-display: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-body: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Nordic — pale aurora blues + heather purple, Scandinavian calm. Sans throughout. */
    [data-theme="nordic"][data-mode="dark"] {
      --bg: #0e1923;
      --bg-elev: #182433;
      --bg-elev-2: #213044;
      --line: #2c3a4d;
      --line-soft: #1a2535;
      --text: #e8edf3;
      --text-mute: #8b95a3;
      --text-dim: #4a5667;
      /* Brighter aurora cyan — was sitting at ~0.50 luminance, easy to miss against
         the deep navy bg. #88dfff pushes to ~0.69 (vivid arctic glow). The secondary
         comes down to a dustier heather to keep the brightness gap honest. */
      --accent: #88dfff;
      --accent-soft: rgba(136, 223, 255, 0.16);
      --accent-2: #9b7a99;
      --accent-2-soft: rgba(155, 122, 153, 0.12);
      --danger: #bf616a;
      --danger-soft: rgba(191, 97, 106, 0.12);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="nordic"][data-mode="light"] {
      --bg: #f4f1ed;
      --bg-elev: #ffffff;
      --bg-elev-2: #e8e2da;
      --line: #d4cec3;
      --line-soft: #e8e2da;
      --text: #2e3440;
      --text-mute: #5e676f;
      --text-dim: #b0b7c1;
      --accent: #2a5a85;
      --accent-soft: rgba(42, 90, 133, 0.10);
      --accent-2: #5a4565;
      --accent-2-soft: rgba(90, 69, 101, 0.10);
      --danger: #a13a3a;
      --danger-soft: rgba(161, 58, 58, 0.10);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Ink — black, rice paper, vermillion seal + indigo dye. East Asian calligraphy. */
    [data-theme="ink"][data-mode="dark"] {
      --bg: #0c0a08;
      --bg-elev: #161310;
      --bg-elev-2: #211c17;
      --line: #2d2620;
      --line-soft: #1c1814;
      --text: #f0eae0;
      --text-mute: #8a7f72;
      --text-dim: #4a4339;
      --accent: #d72638;
      --accent-soft: rgba(215, 38, 56, 0.14);
      --accent-2: #6b7faa;
      --accent-2-soft: rgba(107, 127, 170, 0.12);
      --danger: #c12830;
      --danger-soft: rgba(193, 40, 48, 0.12);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="ink"][data-mode="light"] {
      --bg: #f5efe2;
      --bg-elev: #fdf8eb;
      --bg-elev-2: #ebe2cb;
      --line: #d3c9ad;
      --line-soft: #e3d9bd;
      --text: #1a1612;
      --text-mute: #5a4f42;
      --text-dim: #a89878;
      --accent: #b51d2e;
      --accent-soft: rgba(181, 29, 46, 0.10);
      --accent-2: #4a6088;
      --accent-2-soft: rgba(74, 96, 136, 0.10);
      --danger: #8a1018;
      --danger-soft: rgba(138, 16, 24, 0.10);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Botanical — moss + terracotta clay, Fraunces serif warmth, garden mood. */
    [data-theme="botanical"][data-mode="dark"] {
      --bg: #1a1814;
      --bg-elev: #232019;
      --bg-elev-2: #2d2920;
      --line: #383428;
      --line-soft: #25221b;
      --text: #ede5d3;
      --text-mute: #8a8270;
      --text-dim: #524a3c;
      /* Brighter moss sage — #6fa885 (~0.36 luminance) was actually below terracotta
         (~0.36 too), so the wrong color was winning the eye. Pushing sage to #88cea0
         (~0.55) and dialing terracotta down to a burnt #c47245 (~0.27) restores the
         sage-leads / clay-supports hierarchy this theme always wanted. */
      --accent: #88cea0;
      --accent-soft: rgba(136, 206, 160, 0.16);
      --accent-2: #c47245;
      --accent-2-soft: rgba(196, 114, 69, 0.14);
      --danger: #c14a3a;
      --danger-soft: rgba(193, 74, 58, 0.12);
      --font-display: 'Fraunces', 'Instrument Serif', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="botanical"][data-mode="light"] {
      --bg: #f5efde;
      --bg-elev: #fffaec;
      --bg-elev-2: #ece4ca;
      --line: #d4cba9;
      --line-soft: #e6dec0;
      --text: #2c2818;
      --text-mute: #6b6450;
      --text-dim: #a89e7e;
      --accent: #2d6a4f;
      --accent-soft: rgba(45, 106, 79, 0.10);
      --accent-2: #a64f24;
      --accent-2-soft: rgba(166, 79, 36, 0.10);
      --danger: #8a2c1c;
      --danger-soft: rgba(138, 44, 28, 0.10);
      --font-display: 'Fraunces', 'Instrument Serif', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Plasma — cyberpunk neon: hot magenta + electric violet on blackcurrant. */
    [data-theme="plasma"][data-mode="dark"] {
      --bg: #0a0610;
      --bg-elev: #14091e;
      --bg-elev-2: #1e0e2c;
      --line: #2e1942;
      --line-soft: #1a0d28;
      --text: #f0e0ff;
      --text-mute: #8a7090;
      --text-dim: #50405a;
      --accent: #ff2e88;
      --accent-soft: rgba(255, 46, 136, 0.16);
      /* Deeper, greyer violet. The original #9b6dff sat ~0.41 luminance vs magenta's
         ~0.47 — only 1.15×, basically co-equal. Dropping to #6e5a8a (~0.27) gives a
         1.7× gap and reads as a calmer companion to the hot pink primary. */
      --accent-2: #6e5a8a;
      --accent-2-soft: rgba(110, 90, 138, 0.14);
      --danger: #ff3050;
      --danger-soft: rgba(255, 48, 80, 0.14);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="plasma"][data-mode="light"] {
      --bg: #fcf2fa;
      --bg-elev: #ffffff;
      --bg-elev-2: #f0dff0;
      --line: #d4c0d8;
      --line-soft: #e8d8ec;
      --text: #1c0a24;
      --text-mute: #5c4a64;
      --text-dim: #ad9ab0;
      --accent: #c81e6c;
      --accent-soft: rgba(200, 30, 108, 0.10);
      --accent-2: #6537d4;
      --accent-2-soft: rgba(101, 55, 212, 0.10);
      --danger: #b32850;
      --danger-soft: rgba(179, 40, 80, 0.10);
      --font-display: 'Public Sans', system-ui, sans-serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Atlas — National Geographic editorial: NG yellow + oceanic teal on parchment/ocean. */
    [data-theme="atlas"][data-mode="dark"] {
      --bg: #0a161c;
      --bg-elev: #122029;
      --bg-elev-2: #1a2c37;
      --line: #243845;
      --line-soft: #15242e;
      --text: #f0e8d0;
      --text-mute: #807a68;
      --text-dim: #48443a;
      --accent: #ffd200;
      --accent-soft: rgba(255, 210, 0, 0.14);
      --accent-2: #4a9bb0;
      --accent-2-soft: rgba(74, 155, 176, 0.14);
      --danger: #d4503a;
      --danger-soft: rgba(212, 80, 58, 0.12);
      --font-display: 'Fraunces', 'Instrument Serif', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="atlas"][data-mode="light"] {
      --bg: #faf4e6;
      --bg-elev: #ffffff;
      --bg-elev-2: #efe7d0;
      --line: #d4c8a8;
      --line-soft: #e6dec5;
      --text: #1c1810;
      --text-mute: #6b6450;
      --text-dim: #b0a888;
      --accent: #c89500;
      --accent-soft: rgba(200, 149, 0, 0.12);
      --accent-2: #2b6878;
      --accent-2-soft: rgba(43, 104, 120, 0.10);
      --danger: #a4382e;
      --danger-soft: rgba(164, 56, 46, 0.10);
      --font-display: 'Fraunces', 'Instrument Serif', serif;
      --font-body: 'Public Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    /* Library — dusty sage + oxblood burgundy on walnut/parchment. Full-serif, old book. */
    [data-theme="library"][data-mode="dark"] {
      --bg: #181410;
      --bg-elev: #221d18;
      --bg-elev-2: #2d2620;
      --line: #38302a;
      --line-soft: #251f1a;
      --text: #ecdfca;
      --text-mute: #847b6b;
      --text-dim: #4e4639;
      /* Brighter dusty sage; #94a87a was sitting under the (formerly pinker) burgundy
         visually. #a8bd8a lifts to ~0.50 luminance and the burgundy drops to a proper
         oxblood-ink #8a3838 (~0.19) — the sage now clearly leads and the burgundy
         reads as ink, not as the rebound color. */
      --accent: #a8bd8a;
      --accent-soft: rgba(168, 189, 138, 0.14);
      --accent-2: #8a3838;
      --accent-2-soft: rgba(138, 56, 56, 0.14);
      --danger: #8a3030;
      --danger-soft: rgba(138, 48, 48, 0.12);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'Instrument Serif', 'Times New Roman', serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    [data-theme="library"][data-mode="light"] {
      --bg: #f0e6d2;
      --bg-elev: #faf2dc;
      --bg-elev-2: #e2d6b6;
      --line: #c8bb98;
      --line-soft: #d8cca8;
      --text: #2c1f12;
      --text-mute: #6e5e48;
      --text-dim: #a89678;
      --accent: #5c724a;
      --accent-soft: rgba(92, 114, 74, 0.10);
      --accent-2: #6e2c2c;
      --accent-2-soft: rgba(110, 44, 44, 0.10);
      --danger: #5a1c1c;
      --danger-soft: rgba(90, 28, 28, 0.10);
      --font-display: 'Instrument Serif', 'Times New Roman', serif;
      --font-body: 'Instrument Serif', 'Times New Roman', serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    a { color: var(--accent); text-decoration: none; }
    button { font-family: inherit; font-size: inherit; }

    /* Top-level layout: a flex column that fills the viewport so the composer can sit
       naturally at the bottom without position:fixed hacks (which were causing the empty
       space below the textbox on iOS standalone PWAs). */
    .app {
      display: flex; flex-direction: column;
      height: 100dvh; min-height: 100dvh;
      width: 100%;
    }
    /* The root container holds the live view (list or session). Make it part of the
       flex chain so its child .transcript / .session-list can be the actual scroll
       region — otherwise the whole page scrolls and the header disappears. */
    #root {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }

    /* ───── Header ──────────────────────────────────────────────── */
    header {
      flex: none;
      padding: max(14px, env(safe-area-inset-top)) 20px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      display: flex; align-items: baseline; gap: 14px;
    }
    header .brand {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 400; letter-spacing: -0.01em;
      font-style: italic;
      color: var(--text);
    }
    header .brand::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      margin-right: 10px; transform: translateY(-3px);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    header .meta {
      font-family: var(--font-body); font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-mute);
      margin-left: auto;
    }
    header .back {
      font-family: var(--font-body); font-size: 12px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
      padding: 4px 0;
    }

    /* ───── Session list view ───────────────────────────────────── */
    .session-list {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 20px;
      -webkit-overflow-scrolling: touch;
    }

    .list-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-mute);
      padding: 6px 4px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .list-label::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    .new-session {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 16px 18px;
      font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color 0.15s ease, background 0.15s ease;
      margin-bottom: 24px;
    }
    .new-session:active { background: var(--accent-soft); border-color: var(--accent); }
    .new-session .plus {
      font-family: var(--font-display); font-size: 22px; line-height: 1;
      color: var(--accent); font-style: italic;
    }

    .empty-state {
      padding: 40px 20px; text-align: center;
      color: var(--text-mute); font-size: 13px;
      font-style: italic; font-family: var(--font-display); letter-spacing: 0.01em;
    }

    /* Swipe-to-delete row container. The visible row sits above an absolutely-positioned
       red delete action; horizontal drag uncovers the action. */
    .session-row-wrap {
      position: relative;
      border-bottom: 1px solid var(--line-soft);
      overflow: hidden;
    }
    .session-row-wrap:first-of-type { border-top: 1px solid var(--line-soft); }

    .session-row {
      padding: 18px 4px;
      background: var(--bg);
      display: flex; align-items: flex-start; gap: 14px;
      position: relative; z-index: 1;
      transform: translateX(0);
      transition: transform 0.24s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
      touch-action: pan-y;
      cursor: pointer;
    }
    .session-row.swiping { transition: none; }

    .session-row .marker {
      flex: none;
      font-family: var(--font-display); font-style: italic; font-size: 14px;
      color: var(--text-dim);
      padding-top: 1px; width: 26px;
    }
    .session-row .body { flex: 1; min-width: 0; }
    .session-row .title {
      font-weight: 500; color: var(--text);
      font-size: 14px; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .session-row .meta {
      margin-top: 6px;
      color: var(--text-mute); font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      display: flex; gap: 10px;
      flex-wrap: wrap; row-gap: 4px;
    }
    .session-row .meta .sep { color: var(--text-dim); }

    /* Pending-approval badge on the meta line. Amber, with a pulsing dot that ties
       back to the brand-dot pulse motif. */
    .pending-badge {
      color: var(--accent);
      display: inline-flex; align-items: center; gap: 7px;
    }
    .pending-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    /* When a row has pending approvals, the marker numeral switches from dim to amber.
       Subtle reinforcement of the meta-line badge. */
    .session-row .marker.pending { color: var(--accent); }

    .delete-action {
      position: absolute; top: 0; right: 0; bottom: 0;
      background: var(--danger); color: white;
      display: flex; align-items: center; justify-content: center;
      width: 92px;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
      border: none; cursor: pointer;
      /* Hidden off-screen at rest so it never flickers behind the row during scroll
         (iOS compositor briefly exposes layers behind elements with will-change:transform).
         JS slides it in during a swipe in lockstep with the row's leftward drag. */
      transform: translateX(100%);
      transition: transform 0.24s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
    }
    .delete-action.swiping { transition: none; }
    .delete-action:active { filter: brightness(0.85); }

    /* ───── In-session view ─────────────────────────────────────── */
    /* Compact tasks "trail" — sits between the transcript and the composer, anchored to
       the bottom of the screen the way a terminal's task indicator does. Two rows max:
       the most recently completed task on top (history), the in_progress / next task
       below (alive). They're linked by a 1px vertical hairline running through the dot
       column, which reads as a tiny timeline — "just finished → up now". The whole panel
       is a <button> so tap/focus semantics come free; we strip the default chrome. */
    .todos-panel {
      flex: none;
      width: 100%;
      background: var(--bg);
      border: none;
      border-top: 1px solid var(--line-soft);
      padding: 10px 20px 11px;
      text-align: left;
      cursor: pointer;
      font: inherit; color: inherit;
      display: block;
      position: relative;
      transition: background 0.15s ease;
    }
    .todos-panel:active { background: var(--bg-elev); }
    .todos-panel:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }

    /* One row. The node lives in a fixed-width column on the left so the two rows align
       perfectly and the connector hairline can be drawn through it via ::before on the
       second row. */
    .todos-trail-line {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
      min-height: 22px;
      position: relative;
    }
    .todos-node {
      grid-column: 1;
      justify-self: center;
      width: 7px; height: 7px;
      border: 1px solid var(--text-dim);
      border-radius: 50%;
      background: transparent;
      position: relative;
      z-index: 1;
    }
    .todos-text {
      grid-column: 2;
      min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Vertical connector. Drawn on the "now" row as a 1px line running upward from the
       node into the row above. Gradient fades from dim near the now-row to faint near
       the done-row so it feels like a memory trail. */
    .todos-trail-now::before {
      content: '';
      position: absolute;
      left: 8.5px;            /* aligns with the centered 7px node in an 18px column */
      bottom: 50%;
      width: 1px; height: 22px;
      background: linear-gradient(to top, var(--accent), var(--text-dim) 60%, transparent);
      opacity: 0.7;
      pointer-events: none;
    }

    /* Slot styling — the visual difference between "just done" (top) and "up now" (bottom). */
    .todos-trail-done .todos-node {
      background: var(--text-dim);
      border-color: var(--text-dim);
    }
    .todos-trail-done .todos-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: line-through;
      text-decoration-color: var(--text-dim);
      letter-spacing: 0.01em;
    }

    /* in_progress now-row — accent-filled, pulsing node, italic display copy, full text
       color. This is the visual focal point of the entire bottom strip. */
    .todos-trail-now.todos-status-in_progress .todos-node {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .todos-trail-now.todos-status-in_progress .todos-text {
      color: var(--text);
      font-family: var(--font-display); font-style: italic;
      font-size: 15px; letter-spacing: 0.005em;
      line-height: 1.4;
    }
    /* pending now-row — no in_progress yet, so just sketch the next thing in muted weight. */
    .todos-trail-now.todos-status-pending .todos-node {
      border-color: var(--text-mute);
    }
    .todos-trail-now.todos-status-pending .todos-text {
      color: var(--text-mute);
      font-size: 13px;
    }

    /* Right-side counter + expand affordance — sits in the now-row's third column when
       a two-row trail is rendered, and as part of the all-done line when nothing's active. */
    .todos-panel-meta {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: inline-flex; align-items: center; gap: 8px;
      pointer-events: none;
    }
    .todos-meta-count {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }
    .todos-expand {
      font-family: var(--font-mono); font-size: 13px;
      line-height: 1;
      color: var(--text-mute);
      transform: translateY(-1px);
      transition: color 0.15s ease, transform 0.18s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .todos-panel:active .todos-expand {
      color: var(--accent);
      transform: translateY(-3px);
    }

    /* All-done collapsed line. Single italic statement; the trail metaphor is dropped
       because there's no "now" to point at. */
    .todos-panel-done .todos-trail-line {
      grid-template-columns: 18px 1fr auto;
    }
    .todos-node-done {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todos-text-done {
      font-family: var(--font-display); font-style: italic;
      font-size: 14px;
      color: var(--text-mute);
    }
    .todos-meta {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      display: inline-flex; align-items: center; gap: 8px;
    }

    /* ───── Tasks sheet (expanded view) ─────────────────────────────
       Reuses the .sheet bottom-sheet chrome. Inside, it's structured as an editorial
       page: title + numeric progress fraction + progress bar, then three sections (In
       Progress / Up Next / Completed) each with its own little header. Reads like a
       table of contents rather than a flat checklist. */
    .todos-sheet {
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .todos-sheet-header {
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .todos-sheet-title-block {
      display: flex; flex-direction: column; gap: 6px;
    }
    .todos-sheet-progress-line {
      display: inline-flex; align-items: baseline; gap: 16px;
    }
    .todos-sheet-fraction {
      font-family: var(--font-mono); font-size: 22px; font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .todos-sheet-frac-divider {
      color: var(--text-dim);
      margin: 0 2px;
      font-weight: 300;
    }
    .todos-sheet-pct {
      font-family: var(--font-display); font-style: italic;
      font-size: 18px;
      /* The percentage is a structural read-out of progress; the progress bar fill
         below is the actual live signal and keeps --accent. */
      color: var(--accent-2);
    }
    .todos-sheet-pct-symbol {
      font-size: 12px;
      color: var(--text-dim);
      font-style: normal; font-family: var(--font-mono);
      margin-left: 1px;
    }

    /* Progress bar — single sharp accent fill on a soft track. The fill width animates so
       a TaskUpdate completing one ticks the bar forward smoothly. */
    .todos-progress-bar {
      position: relative;
      height: 3px;
      background: var(--bg-elev-2);
      margin-bottom: 22px;
      overflow: hidden;
    }
    .todos-progress-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 0 12px var(--accent-soft);
    }

    .todos-sheet-body {
      max-height: 62vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin-right: -8px; padding-right: 8px; /* keep scrollbar out of section gutters */
    }

    .todos-section {
      margin-bottom: 22px;
    }
    .todos-section:last-child { margin-bottom: 4px; }

    .todos-section-head {
      display: flex; align-items: baseline; gap: 10px;
      padding-bottom: 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
    }
    .todos-section-label {
      font-family: var(--font-display); font-style: italic;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.005em;
    }
    .todos-section-count {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    /* In-progress section gets the accent treatment on its label so the eye lands there
       first. Completed section gets dimmed — visually de-emphasized history. */
    .todos-section-now .todos-section-label { color: var(--accent); }
    .todos-section-done .todos-section-label { color: var(--text-mute); }

    .todos-section-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column;
    }

    /* One row in the sheet. Three-column grid: dot · numeric id · subject (+ optional
       activeForm line). Generous spacing for tap targets and wrapping. */
    .todos-sheet-row {
      display: grid;
      grid-template-columns: 18px 28px 1fr;
      align-items: start;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line-soft);
      position: relative;
    }
    .todos-sheet-row:first-child { border-top: none; }

    .todos-sheet-node {
      grid-column: 1;
      justify-self: center;
      align-self: start;
      width: 8px; height: 8px;
      margin-top: 7px;
      border: 1px solid var(--text-dim);
      border-radius: 50%;
      background: transparent;
    }
    .todos-status-in_progress .todos-sheet-node {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .todos-status-completed .todos-sheet-node {
      background: var(--text-dim);
      border-color: var(--text-dim);
    }

    .todos-sheet-id {
      grid-column: 2;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      padding-top: 4px;
    }
    .todos-sheet-body-cell {
      grid-column: 3;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 0;
    }
    .todos-sheet-subject {
      font-size: 14px; line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }
    .todos-status-in_progress .todos-sheet-subject {
      font-family: var(--font-display); font-style: italic;
      font-size: 16px;
      color: var(--text);
    }
    .todos-status-completed .todos-sheet-subject {
      color: var(--text-mute);
      text-decoration: line-through;
      text-decoration-color: var(--text-dim);
    }
    .todos-sheet-active {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.01em;
      margin-top: 4px;
    }
    .todos-sheet-empty {
      padding: 24px 0;
    }

    .transcript {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 20px 20px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      margin: 14px 0; max-width: 100%;
      white-space: pre-wrap; word-wrap: break-word;
      font-size: 14px; line-height: 1.6;
    }
    .msg .role {
      display: inline-block;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-mute);
      margin-bottom: 6px; padding-right: 10px;
      border-right: 1px solid var(--line);
      margin-right: 10px;
    }
    .msg.user { color: var(--text); }
    .msg.user .role { color: var(--accent); }
    .msg.assistant { color: var(--text); }
    /* Tool-use entries — overridden from the default .msg layout. The role label is
       replaced by a tool-specific tag at the top (e.g. EDIT, GRAFANA · query_loki_logs),
       followed by a human summary line and, optionally, a mono detail line with the raw
       payload preview. Per-tool formatters live in app.js → formatToolUse. */
    .msg.tool_use {
      display: block;
      color: var(--text);
      background: var(--bg-elev);
      padding: 9px 12px 10px;
      border-left: 2px solid var(--text-dim);
      font-size: 13px;
      /* The base .msg rule sets white-space: pre-wrap so user messages preserve their
         line breaks. We render tool_use as a multi-line HTML template with indented
         children — under pre-wrap, every newline + leading-space between those tags
         becomes literal vertical whitespace, blowing the box up to several lines tall.
         tool_use's children manage their own wrapping, so normal whitespace handling
         is correct here. */
      white-space: normal;
    }
    .msg.tool_use-expandable {
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .msg.tool_use-expandable:active { background: var(--bg-elev-2); }
    .msg.tool_use-expanded {
      /* Open-tile side bar uses --accent-2 to match the payload boxes' left borders.
         The label + chevron on the title row carry the live --accent color instead. */
      border-left-color: var(--accent-2);
      background: var(--bg-elev-2);
    }
    .msg.tool_use .tool-label {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      /* Title + tap-to-expand affordance live on --accent (the brighter, action-y
         color). When the tile is expanded the chevron and the payload's left bar
         move to --accent-2 — the chrome calms down once you've already opened it. */
      color: var(--accent);
      margin-bottom: 0;
      /* Long labels (especially MCP "Server · long_tool_name") get to wrap without
         pushing the summary off-screen. */
      overflow-wrap: anywhere;
    }
    /* Only space the label off when there's actually visible content below it. Edit
       collapsed (label only, the diff lives inside but is display:none) shouldn't have
       a phantom 6px of dead space underneath. */
    .msg.tool_use:has(.tool-summary) .tool-label,
    .msg.tool_use:has(.tool-detail:not([hidden])) .tool-label,
    .msg.tool_use-expanded .tool-label {
      margin-bottom: 6px;
    }
    /* Chevron — a downward CSS-only triangle. Rotates 180° when the tile expands so the
       state is visible without a separate icon font. Sits inline at the end of the label
       row; margin-left:auto pushes it to the right edge. Closed = --accent (matches the
       title above, says "tap here"); open = --accent-2 (calmer, since the action's done
       and the side bar below already shows accent-2 as the open-tile chrome color). */
    .msg.tool_use .tool-chev {
      flex: none;
      width: 0; height: 0;
      margin-left: auto;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--accent);
      transition: transform 0.18s cubic-bezier(0.32, 0.72, 0, 1), border-top-color 0.15s ease;
      transform: translateY(2px);
    }
    .msg.tool_use-expanded .tool-chev {
      transform: translateY(0) rotate(180deg);
      border-top-color: var(--accent-2);
    }
    .msg.tool_use .tool-content {
      display: flex; flex-direction: column;
      gap: 3px;
    }
    .msg.tool_use .tool-summary {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    /* Code-typed summary — file paths, regex, URLs, query strings. Mirrors the inline
       `.md-code` chrome used for backticked text in assistant messages so the visual
       language is consistent across the app. Has to be more than just mono-font: on
       themes where the body font is already mono (almanac, terminal), font-family
       alone is invisible. Background + border + accent color does the work.
       box-decoration-break: clone keeps the chip wrapping cleanly across lines. */
    .msg.tool_use .tool-summary-code {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .msg.tool_use .tool-summary-code code {
      font-family: var(--font-mono);
      font-size: 0.92em;
      /* Structural chip color — pairs with the tool label above (also --accent-2). The
         expanded payload views below (diff, bash, json, etc.) stay on --accent. */
      color: var(--accent-2);
      background: var(--bg-elev-2);
      border: 1px solid var(--line);
      padding: 1px 6px;
      word-break: break-word;
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }
    .msg.tool_use .tool-detail {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-mute);
      line-height: 1.45;
      overflow-wrap: anywhere;
      /* Cap the detail line to 2 lines on phones — anything more is noise; the full
         payload is reachable by tapping the tile to expand the JSON block below. */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Pretty-printed JSON, revealed on tap. Always present in the DOM (so toggling is a
       single class flip — no re-render, no scroll loss, no selection blown away) but
       hidden until the parent gains .tool_use-expanded. The detail line above gets
       suppressed when expanded because the JSON already shows the raw payload. */
    .msg.tool_use .tool-json {
      display: none;
      margin: 8px 0 0;
      padding: 9px 10px 10px;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      font-family: var(--font-mono);
      font-size: 11px; line-height: 1.5;
      color: var(--text-mute);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-json { display: block; }
    /* When the JSON is open the formatted detail line above becomes redundant — hide it
       so the eye isn't pulled in two directions for the same data. */
    .msg.tool_use-expanded .tool-detail { display: none; }

    /* JSON syntax coloring. Restrained palette so the structure is legible without
       turning the block into a rainbow. Keys = accent-2 (structural noun), strings =
       text (the data), numbers = accent (highlight numeric values against the rest),
       bools/null = dim italic (quiet). Splitting keys and numbers across the two
       accents lets them actually be distinguishable; before, both were --accent and
       there was no real syntax coloring at all. */
    .tool-json .json-key { color: var(--accent-2); }
    .tool-json .json-string { color: var(--text); }
    .tool-json .json-num { color: var(--accent); }
    .tool-json .json-bool,
    .tool-json .json-null { color: var(--text-dim); font-style: italic; }

    /* ───── Edit: unified diff ──────────────────────────────────────
       Shown in place of the raw JSON when an Edit tool tile is expanded. Lines that were
       removed get a soft red wash, additions get an accent wash, context stays neutral.
       The +/-/space marker lives in its own gutter column so the file content aligns
       cleanly even when a line wraps. */
    .msg.tool_use .tool-diff {
      display: none;
      margin: 8px 0 0;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-diff { display: block; }
    .tool-diff .diff-head {
      padding: 6px 10px 5px;
      border-bottom: 1px solid var(--line-soft);
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-mute);
      background: var(--bg-elev);
    }
    .tool-diff .diff-body {
      padding: 4px 0;
    }
    .diff-line {
      display: flex;
      align-items: flex-start;
      gap: 0;
      font-family: var(--font-mono);
      font-size: 11px; line-height: 1.5;
      padding: 0 10px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .diff-line .diff-mark {
      flex: none;
      width: 22px;
      text-align: center;
      color: var(--text-dim);
      user-select: none;
      font-weight: 600;
    }
    .diff-line .diff-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .diff-line.diff-eq {
      color: var(--text-mute);
    }
    .diff-line.diff-add {
      background: var(--accent-soft);
      color: var(--text);
    }
    .diff-line.diff-add .diff-mark { color: var(--accent); }
    .diff-line.diff-del {
      background: var(--danger-soft);
      color: var(--text);
    }
    .diff-line.diff-del .diff-mark { color: var(--danger); }

    /* ───── Write: file content preview ─────────────────────────────
       Line-numbered mono block, capped at 500 lines (renderer adds an overflow note).
       Mirrors the diff and bash blocks visually so all "expanded payload" views share
       a consistent left-border + bg + max-height feel. */
    .msg.tool_use .tool-write {
      display: none;
      margin: 8px 0 0;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-write { display: block; }
    .tool-write .write-body { padding: 4px 0; }
    .tool-write .write-line {
      display: grid;
      grid-template-columns: 38px 1fr;
      font-family: var(--font-mono);
      font-size: 11px; line-height: 1.5;
      align-items: start;
    }
    .tool-write .write-ln {
      color: var(--text-dim);
      text-align: right;
      padding-right: 12px;
      user-select: none;
    }
    .tool-write .write-text {
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .tool-write .write-overflow {
      padding: 8px 10px;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      border-top: 1px solid var(--line-soft);
    }

    /* ───── Agent: markdown-rendered subagent prompt ──────────────── */
    .msg.tool_use .tool-agent {
      display: none;
      margin: 8px 0 0;
      padding: 10px 14px 12px;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-agent { display: block; }
    .tool-agent .agent-prompt {
      font-size: 13px; line-height: 1.55;
      color: var(--text);
    }
    .tool-agent .agent-prompt > :first-child { margin-top: 0; }
    .tool-agent .agent-prompt > :last-child { margin-bottom: 0; }

    /* ───── WebFetch: tappable URL + markdown prompt ──────────────── */
    .msg.tool_use .tool-webfetch {
      display: none;
      margin: 8px 0 0;
      padding: 9px 12px 11px;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-webfetch { display: block; }
    .webfetch-url {
      display: flex; gap: 10px; align-items: baseline;
      font-family: var(--font-mono); font-size: 12px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
      word-break: break-all;
    }
    .webfetch-method {
      flex: none;
      color: var(--accent-2);
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .webfetch-url a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--text-dim);
      text-underline-offset: 3px;
      word-break: break-all;
    }
    .webfetch-url a:active { text-decoration-color: var(--accent); }
    .webfetch-url-text { color: var(--text); }
    .webfetch-prompt {
      font-size: 13px; line-height: 1.5;
      color: var(--text);
    }
    .webfetch-prompt > :first-child { margin-top: 0; }
    .webfetch-prompt > :last-child { margin-bottom: 0; }

/* ───── Bash: shell-style command block ───────────────────────── */
    .msg.tool_use .tool-bash {
      display: none;
      margin: 8px 0 0;
      background: var(--bg);
      border-left: 1px solid var(--accent-2);
      padding: 8px 10px 10px;
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .msg.tool_use-expanded .tool-bash { display: block; }
    .tool-bash .bash-desc {
      font-family: var(--font-mono);
      font-size: 11px; line-height: 1.5;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .tool-bash .bash-cmd {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px; line-height: 1.55;
      color: var(--text);
      align-items: start;
    }
    .tool-bash .bash-prompt {
      color: var(--accent-2);
      user-select: none;
      font-weight: 600;
    }
    .tool-bash .bash-cmd-text {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .tool-bash .bash-flags {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 8px;
    }
    .tool-bash .bash-flag {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-mute);
      border: 1px solid var(--line);
      padding: 2px 8px;
    }

    /* ───── Inline Ask Q&A card ─────────────────────────────────────
       Each question pairs directly with its answer in the same row — no separate
       "questions" + "answers" sections. Layout is a 2-column grid: a small mono number
       gutter on the left (the question index, padded "01" / "02" / etc) and the pair
       body (question on top in italic display, answer below with a ↳ marker) on the
       right. Single-question cards drop the numbering but keep the gutter so the answer
       indent stays consistent.

       The card has two states: pending (no answer yet, status badge "Pending", italic
       waiting line per question) and answered (status badge "Answered", normal answers
       beneath each question). */
    .msg.ask {
      background: var(--bg-elev);
      border-left: 2px solid var(--accent);
      padding: 11px 14px 13px;
      color: var(--text);
      white-space: normal;
      display: block;
    }
    .msg.ask.ask-pending {
      border-left-color: var(--text-dim);
    }

    .ask-msg-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
    }
    .ask-msg-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      /* Structural label — same role as tool labels (--accent-2). The "Answered" /
         "Pending" status badge to the right stays on --accent so the state change
         actually reads as a state change. */
      color: var(--accent-2);
    }
    .ask-msg-status {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .msg.ask.ask-answered .ask-msg-status { color: var(--accent); }

    .ask-msg-pairs {
      display: flex; flex-direction: column;
      gap: 14px;
    }
    .ask-msg-pair {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 10px;
      align-items: start;
    }
    .ask-msg-num {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      padding-top: 4px;
      text-align: right;
    }
    .ask-msg-num-spacer { /* invisible placeholder when single-question */
      visibility: hidden;
    }
    .ask-msg-pair-body {
      min-width: 0;
      display: flex; flex-direction: column;
      gap: 4px;
    }
    .ask-msg-q-text {
      font-family: var(--font-display); font-style: italic;
      font-size: 15px; line-height: 1.35;
      color: var(--text);
      letter-spacing: -0.005em;
      overflow-wrap: anywhere;
    }
    .ask-msg-a {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 13px; line-height: 1.45;
      color: var(--text);
    }
    .ask-msg-arrow {
      flex: none;
      font-family: var(--font-mono); font-style: normal;
      font-size: 11px;
      color: var(--text-dim);
      transform: translateY(-1px);
    }
    .ask-msg-a-text {
      flex: 1; min-width: 0;
      word-break: break-word;
    }
    /* Pending answer slot — italic, muted, sets the "waiting" mood. The arrow goes
       dimmer too so the eye doesn't lock onto an answer that doesn't exist yet. */
    .ask-msg-a-pending .ask-msg-a-text {
      font-family: var(--font-display); font-style: italic;
      color: var(--text-mute);
      font-size: 13px;
    }
    .ask-msg-a-pending .ask-msg-arrow { color: var(--text-dim); }
    .ask-msg-a-skipped .ask-msg-a-text {
      color: var(--text-mute);
      font-style: italic;
    }

    /* Free-form reply, appended when the user typed something into the popup's textarea
       in addition to (or instead of) picking options. Visually quieter than the Q&A
       rows since it isn't paired with a specific question. */
    .ask-msg-reply {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--line-soft);
    }
    .ask-msg-reply-label {
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    .ask-msg-reply-text {
      font-family: var(--font-body);
      font-size: 13px; line-height: 1.5;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ───── AskUserQuestion popup ───────────────────────────────────
       A bottom-sheet variant of the existing .sheet pattern, used when Claude calls
       AskUserQuestion. Lays out the question(s) in editorial type, then the options as
       large tap targets, and a free-text reply at the bottom. Tapping a single-select
       option submits immediately; the Send button covers multi-select and free reply. */
    .ask-sheet {
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .ask-sheet-header {
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .ask-sheet-body {
      max-height: 72vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin-right: -8px; padding-right: 8px;
    }
    .ask-question + .ask-question {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--line-soft);
    }
    .ask-q-header {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-mute);
      margin-bottom: 6px;
    }
    .ask-q-text {
      font-family: var(--font-display); font-style: italic;
      font-size: 20px; line-height: 1.3;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.005em;
    }
    .ask-section-label {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-dim);
      margin: 0 0 10px;
    }
    .ask-options {
      display: flex; flex-direction: column;
      gap: 8px;
      margin-bottom: 22px;
    }
    .ask-option {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 12px;
      align-items: start;
      width: 100%;
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 12px 14px;
      cursor: pointer;
      color: var(--text);
      font: inherit;
      transition: border-color 0.12s ease, background 0.12s ease;
    }
    .ask-option:active { background: var(--bg-elev-2); }
    .ask-option.selected,
    .ask-option:focus-visible {
      border-color: var(--accent);
      background: var(--accent-soft);
      outline: none;
    }
    .ask-option-marker {
      width: 12px; height: 12px;
      border: 1px solid var(--text-dim);
      border-radius: 50%;
      align-self: center;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .ask-option[data-multi] .ask-option-marker {
      border-radius: 1px; /* squarish for multi-select to read as a checkbox */
    }
    .ask-option.selected .ask-option-marker {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .ask-option-body {
      display: flex; flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .ask-option-label {
      font-size: 14px; font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .ask-option-desc {
      font-size: 12px; line-height: 1.5;
      color: var(--text-mute);
    }
    .ask-reply-block {
      margin-top: 6px;
      padding-top: 16px;
      border-top: 1px solid var(--line-soft);
    }
    .ask-reply-field {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 14px; line-height: 1.5;
      outline: none;
      resize: none;
      transition: border-color 0.12s ease;
      caret-color: var(--accent);
    }
    .ask-reply-field:focus { border-color: var(--accent); }
    .ask-reply-field::placeholder {
      color: var(--text-dim);
      font-family: var(--font-display); font-style: italic;
      font-size: 15px;
    }
    .ask-actions {
      display: flex; justify-content: flex-end;
      margin-top: 14px;
    }
    .ask-send {
      background: transparent;
      color: var(--text-mute);
      border: 1px solid var(--line);
      padding: 11px 22px;
      font-family: var(--font-body);
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }
    .ask-send.armed {
      color: var(--accent);
      border-color: var(--accent);
    }
    .ask-send.armed:active {
      background: var(--accent-soft);
    }
    .msg.error {
      color: #f4a0a0;
      background: var(--danger-soft); padding: 10px 12px;
      border-left: 2px solid var(--danger);
    }
    .msg.error .role { color: var(--danger); border-color: var(--danger); }

    /* ── Rendered markdown inside assistant messages ───────────── */
    .msg .body-text > :first-child { margin-top: 0; }
    .msg .body-text > :last-child  { margin-bottom: 0; }

    .md-p { margin: 0 0 10px; }
    .md-p:last-child { margin-bottom: 0; }

    .md-h { font-family: var(--font-body); letter-spacing: 0.04em; margin: 18px 0 8px; }
    .md-h1 { font-size: 18px; font-weight: 600; }
    .md-h2 { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; }
    .md-h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-mute); }
    .md-h4, .md-h5, .md-h6 { font-size: 13px; font-weight: 600; color: var(--text-mute); }

    .md-hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }

    .md-list { margin: 0 0 10px; padding-left: 22px; }
    .md-list li { margin: 3px 0; }
    .md-list li::marker { color: var(--text-dim); }

    .md-link {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(244, 185, 26, 0.35);
      text-underline-offset: 3px;
      word-break: break-word;
    }
    .md-link:active { text-decoration-color: var(--accent); }

    .md-code {
      font-family: var(--font-mono); font-size: 0.92em;
      background: var(--bg-elev-2);
      /* Matches the tool-summary code chip — both are structural identifier text. */
      color: var(--accent-2);
      padding: 1px 6px;
      border: 1px solid var(--line);
      word-break: break-word;
    }

    .md-pre {
      margin: 12px 0;
      background: var(--bg-elev-2);
      border-left: 2px solid var(--accent);
      padding: 10px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .md-pre code {
      font-family: var(--font-mono); font-size: 13px; line-height: 1.55;
      color: var(--text);
      background: transparent; border: none; padding: 0;
      white-space: pre;
      display: block; min-width: max-content;
    }

    .md-quote {
      margin: 10px 0; padding: 6px 0 6px 14px;
      border-left: 2px solid var(--line);
      color: var(--text-mute);
      font-style: italic; font-family: var(--font-display); font-size: 16px;
    }

    .md-table-wrap {
      margin: 12px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
    }
    .md-table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    .md-table th {
      text-align: left;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-mute); font-weight: 600;
      padding: 8px 12px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    .md-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--line-soft);
      vertical-align: top;
    }
    .md-table tr:first-child td { border-top: none; }

    .md-table code { font-size: 0.85em; }

    /* Identifier-shaped content inside table cells (linked IDs like CS-1552, inline
       code, etc.) must not break mid-token. .md-link globally uses word-break:
       break-word for prose, which inside a width:100% table lets the browser slice
       short IDs down to a 2-char column whenever a sibling Title column is wider.
       Reverting to word-break:normal inside tables keeps multi-word link text
       wrapping at spaces but stops mid-id slicing — the column widens to fit, and
       the wrap's overflow-x:auto handles any horizontal overflow. */
    .md-table .md-link,
    .md-table .md-code { word-break: normal; }

    /* Stronger / italicized inline text — defaults are fine but normalize colour */
    .body-text strong { font-weight: 600; color: var(--text); }
    .body-text em { color: var(--text); }
    .body-text del { color: var(--text-mute); }

    /* ───── Composer ────────────────────────────────────────────── */
    .composer {
      flex: none;
      background: var(--bg);
      border-top: 1px solid var(--line);
      /* Bottom padding must include env(safe-area-inset-bottom) so the field clears the
         home indicator. Without it, when iOS Safari's URL bar collapses (which any sheet
         drag triggers), 100dvh grows by the URL bar height and the composer slides flush
         with the screen edge, landing on top of the home indicator and becoming hard to
         tap. Mirror of the header's max(14px, env(safe-area-inset-top)) treatment. */
      padding: 10px 18px max(10px, env(safe-area-inset-bottom));
      display: flex; align-items: flex-end; gap: 12px;
    }
    .composer .field {
      flex: 1; min-width: 0;
      font-family: var(--font-body); font-size: 15px; line-height: 1.45;
      color: var(--text);
      background: transparent;
      outline: none;
      max-height: 30vh; overflow-y: auto;
      caret-color: var(--accent);
      padding: 6px 0;
    }
    .composer .field:empty::before {
      content: attr(data-placeholder);
      color: var(--text-dim);
      font-style: italic; font-family: var(--font-display); font-size: 16px;
    }
    .composer .send {
      flex: none;
      width: 38px; height: 38px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text-mute);
      font-family: var(--font-display); font-style: italic; font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .composer .send.armed { color: var(--accent); border-color: var(--accent); }
    .composer .send.armed:active { background: var(--accent-soft); }

    /* ───── Approval card ─────────────────────────────────────────
       Dialed-down chrome: still has an accent border to mark "needs your attention,"
       but the old 4px accent-soft outer glow read more like a CTA banner than a
       transcript event. Lets the label + action buttons carry the urgency on their
       own without the card itself shouting from across the screen. */
    .approval-card {
      margin: 16px 0;
      background: var(--bg-elev);
      border: 1px solid var(--accent);
      padding: 16px 16px 14px;
      position: relative;
    }
    .approval-card .label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px;
    }
    .approval-card .tool {
      font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px;
    }
    .approval-card .summary {
      font-size: 12px; color: var(--text-mute); line-height: 1.5;
      background: var(--bg);
      border-left: 2px solid var(--line);
      padding: 8px 10px;
      margin-bottom: 14px;
      word-break: break-word;
      max-height: 8em; overflow-y: auto;
    }
    .approval-card .actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .approval-card .actions button {
      padding: 12px 0;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text-mute);
      transition: all 0.12s ease;
    }
    .approval-card .actions .approve { color: var(--accent); border-color: var(--accent); }
    .approval-card .actions .approve:active { background: var(--accent-soft); }
    .approval-card .actions .reject { color: var(--danger); border-color: var(--danger); }
    .approval-card .actions .reject:active { background: var(--danger-soft); }

    /* ───── Thinking indicator ──────────────────────────────────────
       Shown as a pseudo-assistant message tile while waiting for a response.
       Uses the same italic-serif idiom as other quiet-state text (empty list,
       composer placeholder), with a mono amber underscore caret that blinks
       like a terminal cursor — both motifs of the app in one tile. */
    .msg.thinking .body-text {
      font-family: var(--font-display); font-style: italic; font-size: 16px;
      color: var(--text-mute);
      letter-spacing: 0.005em;
    }
    /* Inline meta — elapsed seconds + output token count once the stream starts. Small
       mono pill in a dim color so it sits behind the italic "thinking" word but stays
       legible. Pads its own spacing so the text content can be replaced verbatim by the
       ticker without juggling extra whitespace nodes. */
    .msg.thinking .thinking-meta {
      display: inline;
      font-family: var(--font-mono);
      font-style: normal;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .msg.thinking .body-text .caret {
      display: inline-block;
      margin-left: 3px;
      color: var(--accent);
      font-family: var(--font-mono); font-style: normal; font-weight: 500;
      animation: caret-blink 1.05s steps(1, end) infinite;
    }
    @keyframes caret-blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    /* ───── Cross-session approval toast ────────────────────────────
       Slides down from above the header when an approval arrives on a session
       OTHER than the one currently in view. Tap to jump to that session.
       Auto-dismisses after 7s. Matches the approval-card chrome (amber border
       + amber-soft outline + dark elev) for visual consistency. */
    .toast {
      position: fixed;
      top: calc(max(14px, env(safe-area-inset-top)) + 56px);
      left: 50%;
      width: min(360px, calc(100vw - 32px));
      transform: translateX(-50%) translateY(-160%);
      background: var(--bg-elev);
      border: 1px solid var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft), 0 14px 36px rgba(0, 0, 0, 0.5);
      padding: 12px 14px 13px;
      z-index: 100;
      cursor: pointer;
      animation:
        toast-in 0.34s cubic-bezier(0.32, 0.72, 0, 1) forwards,
        toast-out 0.34s cubic-bezier(0.55, 0, 0.45, 0.95) 6.6s forwards;
    }
    .toast:active { background: var(--bg-elev-2); }
    .toast .top-line {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 14px;
    }
    .toast .label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent);
    }
    .toast .arrow {
      font-family: var(--font-display); font-style: italic; font-size: 20px;
      line-height: 1; color: var(--accent);
      transform: translateY(2px);
    }
    .toast .tool {
      margin-top: 6px;
      font-size: 14px; font-weight: 600; color: var(--text);
    }
    .toast .session-ref {
      margin-top: 3px;
      font-size: 11px; letter-spacing: 0.06em;
      color: var(--text-mute);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    @keyframes toast-in {
      from { transform: translateX(-50%) translateY(-160%); }
      to   { transform: translateX(-50%) translateY(0); }
    }
    @keyframes toast-out {
      from { transform: translateX(-50%) translateY(0); opacity: 1; }
      to   { transform: translateX(-50%) translateY(-160%); opacity: 0; }
    }

    /* ───── Settings button (header, list view only) ─────────────────
       Sits between brand and date in the list header. Currentcolor so it
       inherits whichever theme's accent treatment makes sense.  */
    .settings-btn {
      flex: none;
      width: 30px; height: 30px;
      margin-left: auto;
      background: transparent; border: none;
      color: var(--text-mute);
      padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 0;
      transition: color 0.15s ease, transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .settings-btn:active {
      color: var(--accent);
      transform: rotate(60deg);
    }
    .settings-btn svg { display: block; }

    /* ───── Settings sheet ──────────────────────────────────────────
       Bottom sheet with backdrop. Slides up from the bottom on open, drops
       back down on close. The backdrop fades in/out independently so taps
       outside the sheet feel responsive. */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 91;
      background: var(--bg-elev);
      border-top: 1px solid var(--line);
      padding: 18px 20px calc(28px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -16px 48px rgba(0, 0, 0, 0.45);
    }
    .sheet.open { transform: translateY(0); }
    .sheet .grabber {
      width: 36px; height: 3px;
      background: var(--line);
      border-radius: 2px;
      margin: -4px auto 18px;
    }
    .sheet .header-row {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 16px;
    }
    .sheet .sheet-title {
      font-family: var(--font-display); font-style: italic;
      font-size: 22px; letter-spacing: -0.01em;
      color: var(--text);
    }
    .sheet .sheet-close {
      background: transparent; border: none;
      color: var(--text-mute);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
    }
    .sheet .sheet-close:active { color: var(--accent); }

    .sheet-section-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-mute);
      margin: 4px 0 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .sheet-section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    /* Theme cards — each renders in its own palette so the user sees a real preview
       of the theme rather than just reading a label. Colors are split per (theme, mode)
       pair so flipping the appearance sheet's Light/Dark toggle redraws every card with
       the correct mode-specific palette (otherwise the cards stayed dark when switching
       to Light, which looked broken). Each card carries four swatches: accent, accent-2,
       text, and dim — the two-accent system gets surfaced visually. */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .theme-card {
      position: relative;
      padding: 14px 12px 12px;
      border: 1px solid transparent;
      cursor: pointer;
      text-align: left;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
      overflow: hidden;
      background: var(--card-bg);
      color: var(--card-text);
      font-family: var(--card-font, 'Public Sans', system-ui, sans-serif);
    }
    .theme-card:active { transform: scale(0.97); }
    .theme-card.selected {
      outline: 1px solid var(--card-accent);
      outline-offset: 2px;
    }
    .theme-card .preview-stripe {
      display: flex; gap: 4px;
      margin-bottom: 12px;
    }
    .theme-card .swatch {
      width: 12px; height: 12px; border-radius: 50%;
      transition: background 0.18s ease;
    }
    .theme-card .swatch.s1 { background: var(--card-accent); }
    .theme-card .swatch.s2 { background: var(--card-accent-2); }
    .theme-card .swatch.s3 { background: var(--card-text); }
    .theme-card .swatch.s4 { background: var(--card-text-dim); }
    .theme-card .preview-text {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      font-weight: 600;
      transition: color 0.18s ease;
    }
    .theme-card .preview-sub {
      font-size: 10px; margin-top: 2px;
      opacity: 0.6;
    }

    /* Per-theme card variables. Each block sets the card-local --card-* tokens for
       a specific (theme, mode) pair. Adding a new theme just needs four of these
       (two for dark, two for light if the theme's identity differs in light mode). */

    /* LiveKit */
    [data-mode="dark"] .theme-card[data-theme-key="livekit"] {
      --card-bg: #070707; --card-text: #ffffff; --card-text-dim: #555555;
      --card-accent: #1fd5f9; --card-accent-2: #8a8ab8;
    }
    [data-mode="light"] .theme-card[data-theme-key="livekit"] {
      --card-bg: #fdfdfc; --card-text: #000000; --card-text-dim: #b5b5b0;
      --card-accent: #0a259f; --card-accent-2: #5a5680;
    }
    .theme-card[data-theme-key="livekit"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }

    /* Almanac */
    [data-mode="dark"] .theme-card[data-theme-key="almanac"] {
      --card-bg: #0a0a0a; --card-text: #e9e6dd; --card-text-dim: #4a463e;
      --card-accent: #f4b91a; --card-accent-2: #4d9494;
    }
    [data-mode="light"] .theme-card[data-theme-key="almanac"] {
      --card-bg: #faf7ef; --card-text: #1c1814; --card-text-dim: #b3ac96;
      --card-accent: #9a6300; --card-accent-2: #2f6b6b;
    }
    .theme-card[data-theme-key="almanac"] {
      --card-font: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }
    .theme-card[data-theme-key="almanac"] .preview-text {
      font-family: 'Instrument Serif', serif; font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-size: 16px;
    }

    /* Terminal */
    [data-mode="dark"] .theme-card[data-theme-key="terminal"] {
      --card-bg: #000; --card-text: #f0f0f0; --card-text-dim: #3a3a3a;
      --card-accent: #00ff41; --card-accent-2: #708090;
    }
    [data-mode="light"] .theme-card[data-theme-key="terminal"] {
      --card-bg: #ffffff; --card-text: #000000; --card-text-dim: #c0c0c0;
      --card-accent: #009633; --card-accent-2: #5a6878;
    }
    .theme-card[data-theme-key="terminal"] {
      --card-font: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    /* Nordic */
    [data-mode="dark"] .theme-card[data-theme-key="nordic"] {
      --card-bg: #0e1923; --card-text: #e8edf3; --card-text-dim: #4a5667;
      --card-accent: #88dfff; --card-accent-2: #9b7a99;
    }
    [data-mode="light"] .theme-card[data-theme-key="nordic"] {
      --card-bg: #f4f1ed; --card-text: #2e3440; --card-text-dim: #b0b7c1;
      --card-accent: #2a5a85; --card-accent-2: #5a4565;
    }
    .theme-card[data-theme-key="nordic"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }

    /* Ink */
    [data-mode="dark"] .theme-card[data-theme-key="ink"] {
      --card-bg: #0c0a08; --card-text: #f0eae0; --card-text-dim: #4a4339;
      --card-accent: #d72638; --card-accent-2: #6b7faa;
    }
    [data-mode="light"] .theme-card[data-theme-key="ink"] {
      --card-bg: #f5efe2; --card-text: #1a1612; --card-text-dim: #a89878;
      --card-accent: #b51d2e; --card-accent-2: #4a6088;
    }
    .theme-card[data-theme-key="ink"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }
    .theme-card[data-theme-key="ink"] .preview-text {
      font-family: 'Instrument Serif', serif; font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-size: 18px;
    }

    /* Botanical */
    [data-mode="dark"] .theme-card[data-theme-key="botanical"] {
      --card-bg: #1a1814; --card-text: #ede5d3; --card-text-dim: #524a3c;
      --card-accent: #88cea0; --card-accent-2: #c47245;
    }
    [data-mode="light"] .theme-card[data-theme-key="botanical"] {
      --card-bg: #f5efde; --card-text: #2c2818; --card-text-dim: #a89e7e;
      --card-accent: #2d6a4f; --card-accent-2: #a64f24;
    }
    .theme-card[data-theme-key="botanical"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }
    .theme-card[data-theme-key="botanical"] .preview-text {
      font-family: 'Fraunces', serif;
      letter-spacing: 0;
      text-transform: none;
      font-size: 17px;
      font-weight: 500;
    }

    /* Plasma */
    [data-mode="dark"] .theme-card[data-theme-key="plasma"] {
      --card-bg: #0a0610; --card-text: #f0e0ff; --card-text-dim: #50405a;
      --card-accent: #ff2e88; --card-accent-2: #6e5a8a;
    }
    [data-mode="light"] .theme-card[data-theme-key="plasma"] {
      --card-bg: #fcf2fa; --card-text: #1c0a24; --card-text-dim: #ad9ab0;
      --card-accent: #c81e6c; --card-accent-2: #6537d4;
    }
    .theme-card[data-theme-key="plasma"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }
    .theme-card[data-theme-key="plasma"] .preview-text {
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    /* Atlas */
    [data-mode="dark"] .theme-card[data-theme-key="atlas"] {
      --card-bg: #0a161c; --card-text: #f0e8d0; --card-text-dim: #48443a;
      --card-accent: #ffd200; --card-accent-2: #4a9bb0;
    }
    [data-mode="light"] .theme-card[data-theme-key="atlas"] {
      --card-bg: #faf4e6; --card-text: #1c1810; --card-text-dim: #b0a888;
      --card-accent: #c89500; --card-accent-2: #2b6878;
    }
