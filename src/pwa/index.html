    .theme-card[data-theme-key="atlas"] {
      --card-font: 'Public Sans', system-ui, sans-serif;
    }
    .theme-card[data-theme-key="atlas"] .preview-text {
      font-family: 'Fraunces', serif;
      letter-spacing: 0;
      text-transform: none;
      font-size: 17px;
      font-weight: 600;
    }

    /* Library */
    [data-mode="dark"] .theme-card[data-theme-key="library"] {
      --card-bg: #181410; --card-text: #ecdfca; --card-text-dim: #4e4639;
      --card-accent: #a8bd8a; --card-accent-2: #8a3838;
    }
    [data-mode="light"] .theme-card[data-theme-key="library"] {
      --card-bg: #f0e6d2; --card-text: #2c1f12; --card-text-dim: #a89678;
      --card-accent: #5c724a; --card-accent-2: #6e2c2c;
    }
    .theme-card[data-theme-key="library"] {
      --card-font: 'Instrument Serif', 'Times New Roman', serif;
    }
    .theme-card[data-theme-key="library"] .preview-text {
      font-family: 'Instrument Serif', serif; font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-size: 18px;
    }

    /* Mode segmented control. Two equal-width tabs, the active one in accent. */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
    }
    .mode-toggle button {
      background: transparent; border: none;
      color: var(--text-mute);
      padding: 13px 0;
      font-family: var(--font-body);
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .mode-toggle button + button { border-left: 1px solid var(--line); }
    .mode-toggle button.active {
      color: var(--accent);
      background: var(--accent-soft);
    }
    .mode-toggle button .glyph {
      width: 11px; height: 11px;
      border-radius: 50%;
      display: inline-block;
      background: currentColor;
    }
    .mode-toggle button[data-mode="light"] .glyph {
      background: linear-gradient(90deg, currentColor 50%, transparent 50%);
      border: 1px solid currentColor;
    }

    /* Scrollbar — invisible on touch, restrained on desktop */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 0; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header id="header">
      <span class="brand">Claude Relay</span>
    </header>
    <!-- Initial shell rendered server-side so first paint is immediate; JS replaces
         the list contents once /api/sessions resolves. -->
    <div id="root">
      <div class="session-list">
        <button class="new-session" id="new-session-initial">
          <span>New session</span>
          <span class="plus">+</span>
        </button>
        <div class="list-label">Recent</div>
        <div class="empty-state" id="sessions-loading">Loading…</div>
      </div>
    </div>
  </div>
  <!-- Settings sheet — hidden until app.js opens it. The backdrop sits below the sheet
       in z-order so taps outside the sheet bubble up to the backdrop's close handler. -->
  <div class="sheet-backdrop" id="sheet-backdrop" aria-hidden="true"></div>
  <aside class="sheet" id="sheet" aria-hidden="true" role="dialog" aria-label="Settings">
    <div class="grabber"></div>
    <div class="header-row">
      <span class="sheet-title">Appearance</span>
      <button class="sheet-close" id="sheet-close" aria-label="Close settings">✕</button>
    </div>

    <div class="sheet-section-label">Theme</div>
    <div class="theme-grid" id="theme-grid">
      <button class="theme-card" data-theme-key="livekit">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">LiveKit</div>
        <div class="preview-sub">Cyan · Lavender</div>
      </button>
      <button class="theme-card" data-theme-key="almanac">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Almanac</div>
        <div class="preview-sub">Amber · Teal</div>
      </button>
      <button class="theme-card" data-theme-key="terminal">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Terminal</div>
        <div class="preview-sub">Phosphor · Slate</div>
      </button>
      <button class="theme-card" data-theme-key="nordic">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Nordic</div>
        <div class="preview-sub">Aurora · Heather</div>
      </button>
      <button class="theme-card" data-theme-key="ink">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Ink</div>
        <div class="preview-sub">Vermillion · Indigo</div>
      </button>
      <button class="theme-card" data-theme-key="botanical">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Botanical</div>
        <div class="preview-sub">Sage · Terracotta</div>
      </button>
      <button class="theme-card" data-theme-key="plasma">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Plasma</div>
        <div class="preview-sub">Magenta · Violet</div>
      </button>
      <button class="theme-card" data-theme-key="atlas">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Atlas</div>
        <div class="preview-sub">Gold · Ocean</div>
      </button>
      <button class="theme-card" data-theme-key="library">
        <div class="preview-stripe">
          <span class="swatch s1"></span><span class="swatch s2"></span><span class="swatch s3"></span><span class="swatch s4"></span>
        </div>
        <div class="preview-text">Library</div>
        <div class="preview-sub">Sage · Burgundy</div>
      </button>
    </div>

    <div class="sheet-section-label">Mode</div>
    <div class="mode-toggle" id="mode-toggle">
      <button data-mode="light"><span class="glyph"></span>Light</button>
      <button data-mode="dark"><span class="glyph"></span>Dark</button>
    </div>
  </aside>

  <script src="/app.js" type="module"></script>
</body>
</html>
